# Leaf Node Configuration
leaf {
    host: "0.0.0.0"
    port: 7422
    # listen: "0.0.0.0:7422"
    advertise: "leaf.example.com:7422"
    no_advertise: false

    # Reconnect interval for remote leafnodes
    reconnect: "5s"

    # Minimum server version for remote connections
    min_version: "2.8.0"

    # Compression
    compression {
        mode: "s2_auto"
        rtt_thresholds: ["10ms", "50ms", "100ms"]
    }

    # Leafnode interest isolation
    # isolate: false

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Leaf node authorization
    # NOTE: The authorization block inside leafnodes is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "leaf_user"
    #     password: "leaf_pass"
    #     timeout: 5
    #     account: "ACC_A"
    #     nkey: "UBAAQWTW6CG2G6ANGNKB5U2B7HRWHSGMZEZX3AQSAJOQDAUGJD46LD2E"
    #     users: [
    #         { user: "leaf_u1", password: "leaf_p1", account: "ACC_A" }
    #         { user: "leaf_u2", password: "leaf_p2", account: "ACC_B" }
    #     ]
    # }

    # TLS for leaf connections
    # tls {
    #     cert_file: "/path/to/leaf-cert.pem"
    #     key_file: "/path/to/leaf-key.pem"
    #     ca_file: "/path/to/leaf-ca.pem"
    #     verify: true
    #     timeout: 2
    #     handshake_first: true
    # }

    # Remote leafnode connections (solicited)
    remotes: [
        {
            # NOTE: urls field has conf:"-" on RemoteLeafOpts, handled by v1 only.
            # urls: ["nats-leaf://leaf_user:leaf_pass@hub.example.com:7422"]
            account: "ACC_A"
            # credentials: "/path/to/user.creds"
            # nkey: "SUAM..."
            hub: false
            no_randomize: false
            deny_imports: ["restricted.>"]
            deny_exports: ["private.>"]
            first_info_timeout: "10s"
            # disabled: false
            # isolate: false
            # request_isolation: false

            # Compression per-remote
            compression {
                mode: "s2_fast"
            }

            # WebSocket options for remote
            # ws_compression: false
            # ws_no_masking: false

            # JetStream cluster migration
            # jetstream_cluster_migrate: true

            # HTTP proxy for WebSocket connections
            # proxy {
            #     url: "http://proxy.example.com:8080"
            #     username: "proxy_user"
            #     password: "proxy_pass"
            #     timeout: "30s"
            # }

            # TLS for this specific remote
            # tls {
            #     cert_file: "/path/to/remote-cert.pem"
            #     key_file: "/path/to/remote-key.pem"
            #     ca_file: "/path/to/remote-ca.pem"
            #     timeout: 2
            # }
        }
    ]
}
