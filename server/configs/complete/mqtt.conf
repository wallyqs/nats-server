# MQTT Configuration
mqtt {
    host: "0.0.0.0"
    port: 1883
    # no_auth_user: "mqtt_default"

    # MQTT authorization
    # NOTE: The authorization block inside mqtt is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "mqtt_user"
    #     password: "mqtt_pass"
    #     token: "mqtt_token"
    #     timeout: 5
    # }

    # TLS for MQTT
    # tls {
    #     cert_file: "/path/to/mqtt-cert.pem"
    #     key_file: "/path/to/mqtt-key.pem"
    #     ca_file: "/path/to/mqtt-ca.pem"
    #     timeout: 2
    # }

    # JetStream domain
    js_domain: "hub"

    # Stream and consumer replicas
    stream_replicas: 1
    # consumer_replicas is deprecated/ignored in current versions

    # Consumer settings
    consumer_memory_storage: false
    consumer_inactive_threshold: "5m"

    # MQTT QoS settings
    ack_wait: "30s"
    max_ack_pending: 100

    # JetStream API timeout
    js_api_timeout: "5s"

    # QoS 2 handling
    # NOTE: These fields are unexported in Go (rejectQoS2Pub, downgradeQoS2Sub)
    #       and cannot be set by the v2 parser. Commented out for v2 compat.
    # reject_qos2_publish: false
    # downgrade_qos2_subscribe: false
}
