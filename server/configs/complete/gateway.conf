# Gateway Configuration
gateway {
    name: "my-gateway"
    host: "0.0.0.0"
    port: 7222
    # listen: "0.0.0.0:7222"
    advertise: "gateway.example.com:7222"

    # Gateway authorization
    # NOTE: The authorization block inside gateway is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "gw_user"
    #     password: "gw_pass"
    #     timeout: 5
    # }

    # TLS for gateway connections
    # tls {
    #     cert_file: "/path/to/gateway-cert.pem"
    #     key_file: "/path/to/gateway-key.pem"
    #     ca_file: "/path/to/gateway-ca.pem"
    #     verify: true
    #     timeout: 2
    # }

    # Connection retry
    connect_retries: 5
    connect_backoff: true

    # Reject unknown clusters
    reject_unknown_cluster: false

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Remote gateways
    gateways: [
        {
            name: "remote-gw-1"
            # NOTE: urls field has conf:"-" on RemoteGatewayOpts, handled by
            #       v1 parseGateways only. Commented out for v2 compatibility.
            # urls: [
            #     "nats://gw_user:gw_pass@gw1-node1.example.com:7222"
            #     "nats://gw_user:gw_pass@gw1-node2.example.com:7222"
            # ]
            # tls {
            #     cert_file: "/path/to/gw1-cert.pem"
            #     key_file: "/path/to/gw1-key.pem"
            #     ca_file: "/path/to/gw1-ca.pem"
            #     timeout: 2
            # }
        }
    ]
}
