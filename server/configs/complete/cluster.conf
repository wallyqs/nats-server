# Cluster Configuration
cluster {
    name: "my-cluster"
    host: "0.0.0.0"
    port: 6222
    # listen: "0.0.0.0:6222"
    advertise: "cluster.example.com:6222"
    no_advertise: false

    # Cluster authorization
    # NOTE: The authorization block inside cluster is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "cluster_user"
    #     password: "cluster_pass"
    #     timeout: 5
    # }

    # Routes to other cluster members
    # NOTE: routes field has conf:"-" tag, handled by v1 parseCluster only.
    # Commented out for v2 compatibility.
    # routes: [
    #     "nats-route://cluster_user:cluster_pass@node2.example.com:6222"
    #     "nats-route://cluster_user:cluster_pass@node3.example.com:6222"
    # ]

    # TLS for cluster connections
    # tls {
    #     cert_file: "/path/to/cluster-cert.pem"
    #     key_file: "/path/to/cluster-key.pem"
    #     ca_file: "/path/to/cluster-ca.pem"
    #     verify: true
    #     timeout: 2
    # }

    # Connection retry
    connect_retries: 10
    connect_backoff: true

    # Pool size for connections
    pool_size: 3

    # Pinned accounts
    accounts: ["ACC_A", "ACC_B"]

    # Compression
    compression {
        mode: "s2_fast"
        # rtt_thresholds: ["10ms", "20ms", "30ms"]
    }

    # Ping settings
    ping_interval: "30s"
    ping_max: 3

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Cluster permissions
    # NOTE: Commented out because the v2 parser does not support
    #       the permissions block inside cluster (conf:"-" tag).
    #       The v1 parser handles it via parseCluster case matching.
    # permissions {
    #     import {
    #         allow: [">"]
    #         deny: ["restricted.>"]
    #     }
    #     export {
    #         allow: [">"]
    #         deny: ["restricted.>"]
    #     }
    # }
}
