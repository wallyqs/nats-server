# WebSocket Configuration
websocket {
    host: "0.0.0.0"
    port: 8080
    advertise: "ws.example.com:8080"
    no_tls: true

    # TLS for WebSocket
    # tls {
    #     cert_file: "/path/to/ws-cert.pem"
    #     key_file: "/path/to/ws-key.pem"
    #     ca_file: "/path/to/ws-ca.pem"
    #     timeout: 2
    # }

    # Same origin policy
    same_origin: false
    allowed_origins: [
        "https://app.example.com"
        "https://dashboard.example.com"
    ]

    # Compression
    compression: true

    # Handshake timeout
    handshake_timeout: "5s"

    # WebSocket ping interval (overrides server default for WS clients)
    # ping_interval: "30s"

    # No auth user for WebSocket
    # no_auth_user: "ws_default_user"

    # Cookie-based authentication
    jwt_cookie: "nats_jwt"
    user_cookie: "nats_user"
    pass_cookie: "nats_pass"
    token_cookie: "nats_token"

    # WebSocket authorization
    # NOTE: The authorization block inside websocket is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "ws_user"
    #     password: "ws_pass"
    #     token: "ws_token"
    #     timeout: 5
    # }

    # Custom response headers
    headers {
        "Strict-Transport-Security": "max-age=31536000; includeSubDomains"
        "X-Content-Type-Options": "nosniff"
    }
}
