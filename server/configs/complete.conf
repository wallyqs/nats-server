#     # ]
#     # certs: [
#     #     { cert_file: "/path/to/cert1.pem", key_file: "/path/to/key1.pem" },
#     #     { cert_file: "/path/to/cert2.pem", key_file: "/path/to/key2.pem" }
#     # ]
#     # ocsp_peer: true
# }

# ---------------------------------------------------------------------------
# Allow Non-TLS Connections
# ---------------------------------------------------------------------------
allow_non_tls: false

# ---------------------------------------------------------------------------
# Proxy Protocol
# ---------------------------------------------------------------------------
# proxy_protocol: false

# ---------------------------------------------------------------------------
# OCSP Stapling
# ---------------------------------------------------------------------------
ocsp {
    mode: "auto"
    # url: "http://ocsp.example.com"
}

# ---------------------------------------------------------------------------
# OCSP Response Cache
# ---------------------------------------------------------------------------
ocsp_cache {
    type: "local"
    local_store: "_rc_"
    preserve_revoked: false
    save_interval: 300
}

# ---------------------------------------------------------------------------
# Lame Duck Mode
# ---------------------------------------------------------------------------
lame_duck_duration: "30s"
lame_duck_grace_period: "10s"

# ---------------------------------------------------------------------------
# Error Reporting
# ---------------------------------------------------------------------------
connect_error_reports: 3600
reconnect_error_reports: 5

# ---------------------------------------------------------------------------
# No Sublist Cache
# ---------------------------------------------------------------------------
disable_sublist_cache: false

# ---------------------------------------------------------------------------
# No Header Support
# ---------------------------------------------------------------------------
no_header_support: false

# ---------------------------------------------------------------------------
# No Fast Producer Stall
# ---------------------------------------------------------------------------
# no_fast_producer_stall: false

# ---------------------------------------------------------------------------
# Server Tags
# ---------------------------------------------------------------------------
server_tags: [
    "region:us-east-1",
    "cloud:aws",
    "env:production"
]

# ---------------------------------------------------------------------------
# Server Metadata
# ---------------------------------------------------------------------------
server_metadata {
    environment: "production"
    datacenter: "us-east-1"
    team: "platform"
}

# ---------------------------------------------------------------------------
# Default JetStream Domain Mapping
# ---------------------------------------------------------------------------
default_js_domain {
    "ACC_A": "hub"
    "ACC_B": "leaf"
}

# ---------------------------------------------------------------------------
# Trusted Operator Keys
# NOTE: Requires valid operator nkeys. Commented out since we use
#       authorization block below which conflicts with operator mode.
# ---------------------------------------------------------------------------
# trusted_keys: [
#     "OABC..."
# ]

# ---------------------------------------------------------------------------
# System Account
# ---------------------------------------------------------------------------
# NOTE: Commented out because it requires that the named account exist.
#       When used with the accounts{} block below, set to one of those names.
# system_account: "SYS"

# ---------------------------------------------------------------------------
# No System Account
# ---------------------------------------------------------------------------
no_system_account: true

# ---------------------------------------------------------------------------
