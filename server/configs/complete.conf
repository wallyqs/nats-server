# ============================================================================
# NATS Server Complete Reference Configuration
# ============================================================================
# This file exercises every possible configuration field from the server's
# Options struct and all nested structs. It serves as a reference for all
# available configuration options.
#
# NOTE: Some fields are mutually exclusive or may cause validation errors
# when combined. Such fields are commented out with an explanation.
# ============================================================================

# ---------------------------------------------------------------------------
# Server Identity & Basic Settings
# ---------------------------------------------------------------------------
server_name: "complete-reference-server"
host: "0.0.0.0"
port: 4222
client_advertise: "nats.example.com:4222"

# ---------------------------------------------------------------------------
# Logging & Debugging
# ---------------------------------------------------------------------------
debug: false
trace: false
trace_verbose: false
trace_headers: false
logtime: true
logtime_utc: true
logfile: "/var/log/nats/nats-server.log"
logfile_size_limit: 104857600
logfile_max_num: 10
syslog: false
remote_syslog: "udp://syslog.example.com:514"

# ---------------------------------------------------------------------------
# Connection Limits
# ---------------------------------------------------------------------------
max_connections: 65536
max_subscriptions: 10000
max_sub_tokens: 16
max_control_line: 4096
max_payload: 1048576
max_pending: 67108864
max_traced_msg_len: 1024
max_closed_clients: 10000

# ---------------------------------------------------------------------------
# Ping / Pong
# ---------------------------------------------------------------------------
ping_interval: "2m"
ping_max: 4

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
http_port: 8222
https_port: 8443
http_base_path: "/nats"

# ---------------------------------------------------------------------------
# Profiling
# ---------------------------------------------------------------------------
prof_port: 6060
prof_block_rate: 1

# ---------------------------------------------------------------------------
# PID and Ports Files
# ---------------------------------------------------------------------------
pid_file: "/var/run/nats/nats-server.pid"
ports_file_dir: "/var/run/nats"

# ---------------------------------------------------------------------------
# Store Directory (for JetStream)
# NOTE: Commented out here since it's also set inside the jetstream block.
#       Only one declaration is allowed.
# ---------------------------------------------------------------------------
# store_dir: "/data/nats/jetstream"

# ---------------------------------------------------------------------------
# Write Deadline & Timeout
# ---------------------------------------------------------------------------
write_deadline: "10s"
# write_timeout values: "default", "close", "retry"
# write_timeout: "default"

