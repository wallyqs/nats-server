# ---------------------------------------------------------------------------
# Cluster Configuration
# ---------------------------------------------------------------------------
cluster {
    name: "my-cluster"
    host: "0.0.0.0"
    port: 6222
    # listen: "0.0.0.0:6222"
    advertise: "cluster.example.com:6222"
    no_advertise: false

    # Cluster authorization
    # NOTE: The authorization block inside cluster is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "cluster_user"
    #     password: "cluster_pass"
    #     timeout: 5
    # }

    # Routes to other cluster members
    # NOTE: routes field has conf:"-" tag, handled by v1 parseCluster only.
    # Commented out for v2 compatibility.
    # routes: [
    #     "nats-route://cluster_user:cluster_pass@node2.example.com:6222"
    #     "nats-route://cluster_user:cluster_pass@node3.example.com:6222"
    # ]

    # TLS for cluster connections
    # tls {
    #     cert_file: "/path/to/cluster-cert.pem"
    #     key_file: "/path/to/cluster-key.pem"
    #     ca_file: "/path/to/cluster-ca.pem"
    #     verify: true
    #     timeout: 2
    # }

    # Connection retry
    connect_retries: 10
    connect_backoff: true

    # Pool size for connections
    pool_size: 3

    # Pinned accounts
    accounts: ["ACC_A", "ACC_B"]

    # Compression
    compression {
        mode: "s2_fast"
        # rtt_thresholds: ["10ms", "20ms", "30ms"]
    }

    # Ping settings
    ping_interval: "30s"
    ping_max: 3

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Cluster permissions
    # NOTE: Commented out because the v2 parser does not support
    #       the permissions block inside cluster (conf:"-" tag).
    #       The v1 parser handles it via parseCluster case matching.
    # permissions {
    #     import {
    #         allow: [">"]
    #         deny: ["restricted.>"]
    #     }
    #     export {
    #         allow: [">"]
    #         deny: ["restricted.>"]
    #     }
    # }
}

# ---------------------------------------------------------------------------
# Gateway Configuration
# ---------------------------------------------------------------------------
gateway {
    name: "my-gateway"
    host: "0.0.0.0"
    port: 7222
    # listen: "0.0.0.0:7222"
    advertise: "gateway.example.com:7222"

    # Gateway authorization
    # NOTE: The authorization block inside gateway is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "gw_user"
    #     password: "gw_pass"
    #     timeout: 5
    # }

    # TLS for gateway connections
    # tls {
    #     cert_file: "/path/to/gateway-cert.pem"
    #     key_file: "/path/to/gateway-key.pem"
    #     ca_file: "/path/to/gateway-ca.pem"
    #     verify: true
    #     timeout: 2
    # }

    # Connection retry
    connect_retries: 5
    connect_backoff: true

    # Reject unknown clusters
    reject_unknown_cluster: false

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Remote gateways
    gateways: [
        {
            name: "remote-gw-1"
            # NOTE: urls field has conf:"-" on RemoteGatewayOpts, handled by
            #       v1 parseGateways only. Commented out for v2 compatibility.
            # urls: [
            #     "nats://gw_user:gw_pass@gw1-node1.example.com:7222"
            #     "nats://gw_user:gw_pass@gw1-node2.example.com:7222"
            # ]
            # tls {
            #     cert_file: "/path/to/gw1-cert.pem"
            #     key_file: "/path/to/gw1-key.pem"
            #     ca_file: "/path/to/gw1-ca.pem"
            #     timeout: 2
            # }
        }
    ]
}

# ---------------------------------------------------------------------------
# Leaf Node Configuration
# ---------------------------------------------------------------------------
leaf {
    host: "0.0.0.0"
    port: 7422
    # listen: "0.0.0.0:7422"
    advertise: "leaf.example.com:7422"
    no_advertise: false

    # Reconnect interval for remote leafnodes
    reconnect: "5s"

    # Minimum server version for remote connections
    min_version: "2.8.0"

    # Compression
    compression {
        mode: "s2_auto"
        rtt_thresholds: ["10ms", "50ms", "100ms"]
    }

    # Leafnode interest isolation
    # isolate: false

    # Write settings
    write_deadline: "10s"
    # write_timeout: "default"

    # Leaf node authorization
    # NOTE: The authorization block inside leafnodes is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "leaf_user"
    #     password: "leaf_pass"
    #     timeout: 5
    #     account: "ACC_A"
    #     nkey: "UBAAQWTW6CG2G6ANGNKB5U2B7HRWHSGMZEZX3AQSAJOQDAUGJD46LD2E"
    #     users: [
    #         { user: "leaf_u1", password: "leaf_p1", account: "ACC_A" }
    #         { user: "leaf_u2", password: "leaf_p2", account: "ACC_B" }
    #     ]
    # }

    # TLS for leaf connections
    # tls {
    #     cert_file: "/path/to/leaf-cert.pem"
    #     key_file: "/path/to/leaf-key.pem"
    #     ca_file: "/path/to/leaf-ca.pem"
    #     verify: true
    #     timeout: 2
    #     handshake_first: true
    # }

    # Remote leafnode connections (solicited)
    remotes: [
        {
            # NOTE: urls field has conf:"-" on RemoteLeafOpts, handled by v1 only.
            # urls: ["nats-leaf://leaf_user:leaf_pass@hub.example.com:7422"]
            account: "ACC_A"
            # credentials: "/path/to/user.creds"
            # nkey: "SUAM..."
            hub: false
            no_randomize: false
            deny_imports: ["restricted.>"]
            deny_exports: ["private.>"]
            first_info_timeout: "10s"
            # disabled: false
            # isolate: false
            # request_isolation: false

            # Compression per-remote
            compression {
                mode: "s2_fast"
            }

            # WebSocket options for remote
            # ws_compression: false
            # ws_no_masking: false

            # JetStream cluster migration
            # jetstream_cluster_migrate: true

            # HTTP proxy for WebSocket connections
            # proxy {
            #     url: "http://proxy.example.com:8080"
            #     username: "proxy_user"
            #     password: "proxy_pass"
            #     timeout: "30s"
            # }

            # TLS for this specific remote
            # tls {
            #     cert_file: "/path/to/remote-cert.pem"
            #     key_file: "/path/to/remote-key.pem"
            #     ca_file: "/path/to/remote-ca.pem"
            #     timeout: 2
            # }
        }
    ]
}

# ---------------------------------------------------------------------------
# JetStream Configuration
# ---------------------------------------------------------------------------
jetstream {
    store_dir: "/data/nats/jetstream"
    max_mem: 1073741824
    max_file: 10737418240
    domain: "hub"
    sync: "1m"
    # cipher: "aes"
    # key: "myencryptionkey"
    # prev_key: "myoldencryptionkey"
    # extension_hint: "o2"
    unique_tag: "az"
    max_outstanding_catchup: 67108864
    max_buffered_size: 67108864
    max_buffered_msgs: 65536
    request_queue_limit: 500
    info_queue_limit: 500
    meta_compact: 100
    meta_compact_size: 8388608
    meta_compact_sync: false

    # JetStream limits
    limits {
        max_request_batch: 256
        max_ack_pending: 65535
        max_ha_assets: 100
        duplicate_window: "2m"
    }

    # TPM options
    # tpm {
    #     keys_file: "/path/to/tpm-keys.json"
    #     encryption_password: "tpm_encrypt_pass"
    #     srk_password: "tpm_srk_pass"
    #     pcr: 7
    # }
}

# ---------------------------------------------------------------------------
# WebSocket Configuration
# ---------------------------------------------------------------------------
websocket {
    host: "0.0.0.0"
    port: 8080
    advertise: "ws.example.com:8080"
    no_tls: true

    # TLS for WebSocket
    # tls {
    #     cert_file: "/path/to/ws-cert.pem"
    #     key_file: "/path/to/ws-key.pem"
    #     ca_file: "/path/to/ws-ca.pem"
    #     timeout: 2
    # }

    # Same origin policy
    same_origin: false
    allowed_origins: [
        "https://app.example.com"
        "https://dashboard.example.com"
    ]

    # Compression
    compression: true

    # Handshake timeout
    handshake_timeout: "5s"

    # WebSocket ping interval (overrides server default for WS clients)
    # ping_interval: "30s"

    # No auth user for WebSocket
    # no_auth_user: "ws_default_user"

    # Cookie-based authentication
    jwt_cookie: "nats_jwt"
    user_cookie: "nats_user"
    pass_cookie: "nats_pass"
    token_cookie: "nats_token"

    # WebSocket authorization
    # NOTE: The authorization block inside websocket is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "ws_user"
    #     password: "ws_pass"
    #     token: "ws_token"
    #     timeout: 5
    # }

    # Custom response headers
    headers {
        "Strict-Transport-Security": "max-age=31536000; includeSubDomains"
        "X-Content-Type-Options": "nosniff"
    }
}

# ---------------------------------------------------------------------------
# MQTT Configuration
# ---------------------------------------------------------------------------
mqtt {
    host: "0.0.0.0"
    port: 1883
    # no_auth_user: "mqtt_default"

    # MQTT authorization
    # NOTE: The authorization block inside mqtt is handled by the v1
    #       parser only (conf:"-" on auth fields). Commented out for v2 compat.
    # authorization {
    #     user: "mqtt_user"
    #     password: "mqtt_pass"
    #     token: "mqtt_token"
    #     timeout: 5
    # }

    # TLS for MQTT
    # tls {
    #     cert_file: "/path/to/mqtt-cert.pem"
    #     key_file: "/path/to/mqtt-key.pem"
    #     ca_file: "/path/to/mqtt-ca.pem"
    #     timeout: 2
    # }

    # JetStream domain
    js_domain: "hub"

    # Stream and consumer replicas
    stream_replicas: 1
    # consumer_replicas is deprecated/ignored in current versions

    # Consumer settings
    consumer_memory_storage: false
    consumer_inactive_threshold: "5m"

    # MQTT QoS settings
    ack_wait: "30s"
    max_ack_pending: 100

    # JetStream API timeout
    js_api_timeout: "5s"

    # QoS 2 handling
    # NOTE: These fields are unexported in Go (rejectQoS2Pub, downgradeQoS2Sub)
    #       and cannot be set by the v2 parser. Commented out for v2 compat.
    # reject_qos2_publish: false
    # downgrade_qos2_subscribe: false
}

